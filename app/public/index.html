<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>End-to-End Book Translation Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container py-5">
        <header class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
            <div>
                <h1 class="h3 mb-0">End-to-End Book Translation Project</h1>
                <p class="text-muted small mb-0">Book Translation Demo</p>
            </div>
            <nav class="btn-group">
                <button class="btn btn-outline-primary active" id="btnMainPage" onclick="showMainView()">New
                    Job</button>
                <button class="btn btn-outline-primary" id="btnJobs" onclick="showJobsView()">My Jobs</button>
            </nav>
        </header>

        <main id="view-main">
            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">1. Upload Document</h5>
                    <div class="mb-3">
                        <label for="pdfInput" class="form-label">Select PDF file</label>
                        <input class="form-control" type="file" id="pdfInput" accept=".pdf">
                    </div>
                </div>
            </div>

            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">2. Languages</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small text-muted">From</label>
                            <select class="form-select" id="langFrom">
                                <option value="English">English</option>
                                <option value="French">French</option>
                                <option value="Italian">Italian</option>
                                <option value="German">German</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small text-muted">To</label>
                            <select class="form-select" id="langTo">
                                <option value="English">English</option>
                                <option value="French">French</option>
                                <option value="Italian">Italian</option>
                                <option value="German">German</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">3. Style & Tone</h5>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Style</label>
                        <select class="form-select" id="styleSelect">
                            <option value="literal">Literal</option>
                            <option value="natural" selected>Natural</option>
                            <option value="formal">Formal</option>
                            <option value="academic">Academic</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Tone</label>
                        <select class="form-select" id="toneSelect">
                            <option value="neutral" selected>Neutral</option>
                            <option value="professional">Professional</option>
                            <option value="friendly">Friendly</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-3">4. Advanced</h5>
                    <div class="mb-3">
                        <label class="form-label small text-muted">Custom Instructions</label>
                        <textarea class="form-control" id="customPrompt" rows="2"
                            placeholder="Optional notes..."></textarea>
                    </div>
                </div>
            </div>

            <div class="text-end">
                <button class="btn btn-primary btn-lg px-5" id="translateBtn" onclick="translateDocument()">Start
                    Translation</button>
            </div>
        </main>

        <section id="view-jobs" style="display: none;">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h5 class="mb-0">Job History</h5>
                </div>
                <div class="card-body p-0">
                    <div id="jobsLoading" class="p-3 text-center" style="display: none;">
                        <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                        <span class="ms-2">Loading...</span>
                    </div>
                    <div id="jobsEmpty" class="p-4 text-center text-muted" style="display: none;">No jobs found.</div>
                    <ul class="list-group list-group-flush" id="jobsList"></ul>
                </div>
            </div>
        </section>
    </div>

    <script>
        const API_BASE = '/api';

        function showMainView() {
            document.getElementById('view-main').style.display = 'block';
            document.getElementById('view-jobs').style.display = 'none';
            document.getElementById('btnMainPage').classList.add('active');
            document.getElementById('btnJobs').classList.remove('active');
        }

        function showJobsView() {
            document.getElementById('view-main').style.display = 'none';
            document.getElementById('view-jobs').style.display = 'block';
            document.getElementById('btnMainPage').classList.remove('active');
            document.getElementById('btnJobs').classList.add('active');
            loadJobs();
        }

        async function translateDocument() {
            const pdfInput = document.getElementById('pdfInput');
            if (pdfInput.files.length === 0) {
                alert('Please select a PDF file.');
                return;
            }

            const btn = document.getElementById('translateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Starting...';

            const options = {
                style: document.getElementById('styleSelect').value,
                tone: document.getElementById('toneSelect').value,
                customPrompt: document.getElementById('customPrompt').value.trim()
            };

            const formData = new FormData();
            formData.append('pdf', pdfInput.files[0]);
            formData.append('tenantId', 'default-user');
            formData.append('sourceLang', document.getElementById('langFrom').value);
            formData.append('targetLang', document.getElementById('langTo').value);
            formData.append('options', JSON.stringify(options));

            try {
                const response = await fetch(`${API_BASE}/jobs`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    showJobsView();
                    pdfInput.value = '';
                } else {
                    const err = await response.json();
                    alert('Error: ' + (err.error || 'Failed to start job'));
                }
            } catch (err) {
                alert('Connection error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Start Translation';
            }
        }

        async function loadJobs() {
            const list = document.getElementById('jobsList');
            const loading = document.getElementById('jobsLoading');
            const empty = document.getElementById('jobsEmpty');

            loading.style.display = 'block';
            list.innerHTML = '';
            empty.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/jobs`);
                const jobs = await response.json();
                loading.style.display = 'none';

                if (jobs.length === 0) {
                    empty.style.display = 'block';
                    return;
                }

                jobs.forEach(job => {
                    const li = document.createElement('li');
                    li.className = 'list-group-item d-flex justify-content-between align-items-center py-3';

                    const date = new Date(job.createdAt).toLocaleString();
                    const statusClass = job.status === 'COMPLETED' ? 'bg-success' : (job.status === 'FAILED' ? 'bg-danger' : 'bg-info');

                    li.innerHTML = `
                        <div>
                            <div class="fw-bold">${job.filename}</div>
                            <div class="text-muted small">${date} • ${job.sourceLanguage} &rarr; ${job.targetLanguage}</div>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <span class="badge ${statusClass}">${job.status}</span>
                            ${job.status === 'COMPLETED' ? `<a href="/api/jobs/${job._id}/download" class="btn btn-sm btn-outline-success" target="_blank">Download</a>` : ''}
                        </div>
                    `;
                    list.appendChild(li);
                });
            } catch (err) {
                loading.textContent = 'Error loading jobs';
            }
        }

        setInterval(() => {
            if (document.getElementById('view-jobs').style.display === 'block') {
                loadJobs();
            }
        }, 5000);
    </script>
</body>

</html>
